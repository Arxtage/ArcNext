<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser</title>
  </head>
  <body>
    <div id="external-shell-root">
      <header class="external-shell-toolbar">
        <div class="external-shell-meta">
          <div id="external-shell-title" class="external-shell-title">Loading…</div>
          <div id="external-shell-url" class="external-shell-url"></div>
        </div>
        <button id="external-shell-dock" class="external-shell-button" type="button" title="Dock to ArcNext (Cmd/Ctrl+Shift+D)">
          Dock
        </button>
      </header>
      <main class="external-shell-content" aria-hidden="true"></main>
    </div>
    <script type="module" src="./externalShell.ts"></script>
  </body>
</html>
